<!DOCTYPE html>
<html>
  <head>
    <title>Library site</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
  <span class="logo">Online Library</span>
  <div class="remote">
  <button id="add"><div class="icon"><img src="images/plus-circle.svg"></div><div class="text">Add Book</div></button>
 <button id="delete"><div class="icon"><img src="images/delete-circle.svg"></div><div class="text">Delete Book</div></button>
  </div>
  <div id="main-content">
    </div>
    <dialog id="favDialog">
      <form>
        <h3>Add Book</h3>
        <input type="text" id="Title"name ="title" placeholder="Title of book"><br>
        <input type="text" id="Author" name="author" placeholder="author"><br>
        <input type="number" id="Pages" name="pages" placeholder="number of pages"><br>
        <input type="text" id="Read" name="read" placeholder="true /false"><br>
        <div>
      <button value="cancel" formmethod="dialog">Cancel</button>
      <button id="confirmBtn" value="default">Confirm</button>
    </div>
    </form>
    </dialog>
<script src="script.js"></script>
  </body>
  
</html>
